    subtitle: |
      <div class="nk-aff-htl">
        <div class="nk-aff-hitem">
          <div class="nk-aff-horg">🇮🇹 Ca' Foscari University of Venice</div>
          <div class="nk-aff-hrole">B.A. &middot; Economics &amp; Business</div>
        </div>
        <div class="nk-aff-hitem">
          <div class="nk-aff-horg">🇰🇷 Korea University</div>
          <div class="nk-aff-hrole">M.A. &middot; International Commerce</div>
        </div>
        <div class="nk-aff-hitem nk-aff-hitem--current">
          <div class="nk-aff-horg">🇬🇧 UCL School of Management&nbsp;<span class="nk-now">Now</span></div>
          <div class="nk-aff-hrole">MRes/Ph.D. &middot; Organizations &amp; Innovation</div>
        </div>
      </div>
      <p>
      Ciao! 👋🏻 I am a Ph.D. Candidate in the Organizations and Innovation Group at the UCL School of Management, where I am supervised by
      <a href="https://www.mgmt.ucl.ac.uk/people/sarahharvey" class="person-link" target="_blank" rel="noopener noreferrer">Sarah Harvey</a> and
      <a href="https://www.mgmt.ucl.ac.uk/people/colinfisher" class="person-link" target="_blank" rel="noopener noreferrer">Colin Fisher</a>.
      </p>
      <p style="margin-top:.6rem">
      My research explores how people navigate novelty in the workplace, with a particular focus on how creative and marginalized workers experience and respond to the ambiguity and uncertainty that accompany novelty at work. I develop theory using a range of qualitative methods, including interviews, participant observation, and shadowing. Across my research, I have studied women in live comedy, stand-up comedians, migrant women of color, illustrators, museum curators, and AI developers.
      </p>
      <p style="margin-top:1.1rem;display:flex;flex-wrap:wrap;justify-content:center;gap:.45rem;align-items:center">
        <span class="nk-chip">Creativity</span>
        <span class="nk-chip">Innovation</span>
        <span class="nk-chip">Gender</span>
        <span class="nk-chip">Technology</span>
        <span class="nk-chip">Qualitative Methods</span>
      </p>
